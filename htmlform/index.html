<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Record Form</h1>

    <form action="./app.js">
        <label for="name1">Your Name:</label>
        <input type="text"placeholder="Enter your name" id="name1" name="Name"> <br> <br>

        <label for="password">Your Password:</label>
        <input type="password" placeholder="Enter Your password" id="password" name="password"> <br> <br>

        <!-- <label for="gender">Gender:</label> -->
         <span>Enter Your Gender:</span>

        <input type="radio" name="gen" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gen" id="female">
        <label for="female">Female</label>
        
        <input type="radio" name="gen" id="others">
        <label for="others">Others</label> <br> <br>

        <p>Choose Languages:</p>

        <input type="checkbox" name="html" id="html">
        <label for="html">HTML</label> <br>

        
        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label> <br>
        
        <input type="checkbox" name="javascript" id="javascript">
        <label for="javascript">JAVASCRIPT</label> <br>
        
        <input type="checkbox" name="react" id="react">
        <label for="react">REACT</label> <br>
        
        <input type="checkbox" name="python" id="python">
        <label for="python">PYTHON</label> <br>

        <!-- <input type="button" value="Submit" name="" id=""> -->
        <input type="submit" name="" id="">
        <!-- <button onclick=>Login</button> -->


    </form>
    
</body>
</html>
